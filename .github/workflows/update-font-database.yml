name: Update Font Database

on:
  # Run monthly on the 1st at 2am UTC
  schedule:
    - cron: '0 2 1 * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:
  
  # Run on pushes to main that modify the script
  push:
    branches:
      - main
    paths:
      - 'scripts/create_bunny_font_db.py'
      - '.github/workflows/update-font-database.yml'

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      
      - name: Set up Python
        run: uv python install 3.11
      
      - name: Install dependencies
        run: uv sync
      
      - name: Run font database script
        run: uv run scripts/create_bunny_font_db.py --output data/fonts_database.json
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code data/fonts_database.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/fonts_database.json
          git commit -m "chore: update Bunny Fonts database [skip ci]"
          git push
      
      - name: Summary
        run: |
          echo "## Font Database Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/fonts_database.json ]; then
            FONT_COUNT=$(jq '.count' data/fonts_database.json)
            GENERATED=$(jq -r '.generated' data/fonts_database.json)
            echo "✅ Database updated successfully" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Fonts**: $FONT_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- **Generated**: $GENERATED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Categories" >> $GITHUB_STEP_SUMMARY
            jq -r '.fonts | group_by(.category) | map({category: .[0].category, count: length}) | sort_by(-.count) | .[] | "- \(.category): \(.count)"' data/fonts_database.json >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Database file not found" >> $GITHUB_STEP_SUMMARY
          fi
