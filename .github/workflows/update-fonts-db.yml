name: Update Fonts Database

on:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::usethis
            any::jsonlite
        
      - name: Update font database (Python)
        run: |
          uv run scripts/create_font_db_bunny.py
      
      - name: Create R data object
        run: |
          Rscript data-raw/bunny_fonts.R
        shell: bash
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/bunny_fonts.rda data-raw/fonts_database.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update Bunny Fonts database"
          title: "Update Bunny Fonts database"
          body: |
            This PR updates the Bunny Fonts database with the latest fonts from fonts.bunny.net.
            
            Updated files:
            - data-raw/fonts_database.json (raw JSON from API)
            - data/bunny_fonts.rda (processed R data object)
            
            Auto-generated by GitHub Actions.
          branch: update-fonts-db
          delete-branch: true
