repos:
  - repo: local
    hooks:
      - id: pkgdown-build
        name: Build pkgdown site
        entry: bash -c 'Rscript -e "pkgdown::build_site(quiet = TRUE)" && git add docs/'
        language: system
        pass_filenames: false
        files: '^(R/|man/|vignettes/|_pkgdown\.yml|DESCRIPTION|README\.md|NEWS\.md)'
