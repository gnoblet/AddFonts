name: pkgdown

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pkgdown:
    runs-on: codeberg-medium
    concurrency:
      group: pkgdown-${{ forge.event_name != 'pull_request' || forge.run_id }}
    env:
      GITHUB_PAT: ${{ forge.token }}

    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
        shell: bash

      - uses: https://github.com/r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.0'
          use-public-rspm: 'true'

      - name: Install dependencies
        run: |
          install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")
          options(repos = c(CRAN = "https://p3m.dev/cran/2026-06-30/bin/linux/manylinux_2_28-x86_64/4.6"))
          pak::pak(c("any::pkgdown", "local::."), ask = FALSE)
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to Codeberg Pages
        if: forge.event_name != 'pull_request'
        uses: https://codeberg.org/git-pages/action@v2
        with:
          site: "https://gnoblet.codeberg.page/AddFonts/"
          token: ${{ forge.token }}
          source: docs/
