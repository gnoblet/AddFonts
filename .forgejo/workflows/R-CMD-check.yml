name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  R-CMD-check:
    runs-on: codeberg-small

    name: ${{ matrix.config.r }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {r: 'devel', http-user-agent: 'release'}
          - {r: 'release'}

    env:
      GITHUB_PAT: ${{ forge.token }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: https://github.com/actions/checkout@v4

      - uses: https://github.com/r-lib/actions/setup-pandoc@v2

      - uses: https://github.com/r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: 'true'

      - uses: https://github.com/r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: https://github.com/r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: 'true'
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
